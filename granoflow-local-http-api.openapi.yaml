          description: Resource command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/tasks/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      tags: [Resources]
      summary: Complete task
      description: Marks a task completed through the App business service layer.
      operationId: completeTask
      requestBody:
