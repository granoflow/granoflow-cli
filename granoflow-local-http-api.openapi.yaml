openapi: 3.1.0
info:
  title: Granoflow Local HTTP API
  version: 0.2.0
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "56789"
security:
  - bearerAuth: []
tags:
  - name: Meta
  - name: Commands
  - name: Resources
  - name: Reviews
  - name: Sync
  - name: Backup
  - name: Import
paths:
  /:
    get:
      tags: [Meta]
      summary: Human-readable welcome page
      description: Public browser-friendly landing response with version and API documentation URL.
      operationId: getWelcome
      security: []
      responses:
        "200":
          description: Welcome text
          content:
            text/plain:
              schema:
                type: string
  /v1/health:
    get:
      tags: [Meta]
      summary: Health check
      description: Public health probe. No bearer token required.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Server reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/version:
    get:
      tags: [Meta]
      summary: Version metadata
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/capabilities:
    get:
      tags: [Meta]
      summary: Machine-readable Local HTTP API capabilities
      description: Public capability discovery for CLI, scripts, and AI automation.
      operationId: getCapabilities
      security: []
      responses:
        "200":
          description: Capability payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
  /v1/commands:
    post:
      tags: [Commands]
      summary: Execute command envelope
      operationId: postCommands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandEnvelope"
      responses:
        "200":
          description: Command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tools:
    get:
      tags: [Commands]
      summary: List AI agent tools exposed by the App service layer
      description: >
        Runtime capability discovery for AI agents. `single_task_ai` may
        advertise `capabilities.reviewCardDraftNoteFields.capability =
        review_card_draft_note_fields_v1`; callers must check this before
        sending structured review-card `note_fields`, `front_layout`, or
        `back_layout` fields.
      operationId: listAiAgentTools
      responses:
        "200":
          description: AI agent tool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/review-card-drafts/schema:
    get:
      tags: [Commands]
      summary: Review card draft template and field schema for AI import
      description: >
        Returns machine-readable card types, note field types, study patterns,
        and fallback guidance for `single_task_ai` `review_card_drafts` import.
      operationId: getReviewCardDraftSchema
      responses:
        "200":
          description: Review card draft schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/{id}/export:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Commands]
      summary: Export a single-task AI request package
      operationId: exportAiAgentTask
      responses:
        "200":
          description: AI task request package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/similar-solutions:
    post:
      tags: [Commands]
      summary: Search similar historical task experiences for an AI agent
      description: >
        Semantic-search endpoint for AI agents. The caller sends a task or
        problem summary; Granoflow computes the local embedding and returns
        similar historical task experiences. Results are evidence-bound:
        completed tasks with `task_review` return `outcome=success`; archived
        tasks with `task_review` return `outcome=failed_or_abandoned`; tasks
        without review evidence are not returned by default. When semantic
        search is disabled, the model asset is not ready, or the index has no
        usable candidates yet, the response is HTTP 200 with `ok=false` and
        `error.code` set to `vector_search_disabled`,
        `model_asset_not_ready`, or `semantic_index_not_ready`.
      operationId: searchAiAgentSimilarTaskSolutions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary]
              properties:
                summary:
                  type: string
                  minLength: 1
                  maxLength: 500
                errorText:
                  type: string
                  maxLength: 1000
                repo:
                  type: string
                module:
                  type: string
                paths:
                  type: array
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 240
                limit:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 8
                client:
                  type: string
      responses:
        "200":
          description: Similar task experiences or a business-level disabled/not-ready result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/validate:
    post:
      tags: [Commands]
      summary: Validate a single-task AI reply
      operationId: validateAiAgentTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Single-task AI reply JSON object, either as the raw reply
                payload, a `payload`/`data` wrapper, or a Granoflow AI reply
                envelope. `data.review_card_drafts[]` must always keep complete
                fallback content in `front` and `back`. When
                `/v1/ai-agent/tools` advertises
                `review_card_draft_note_fields_v1`, card drafts may also carry
                `note_fields[]` entries with `key`, `label`, `type`, `value`,
                and optional `tts_language_code` for `text_to_speech`, plus
                `front_layout` and `back_layout`.
              properties:
                toolId:
                  type: string
                  description: Optional tool id. Defaults to `single_task_ai`.
                payload:
                  type: object
                  description: >
                    Single-task AI reply payload. Enhanced review-card fields
                    require `review_card_draft_note_fields_v1`; otherwise
                    callers should keep pronunciation, phonetic, and
                    translation hints directly in `front` and `back`.
                data:
                  type: object
                  description: Alternate wrapper for the single-task AI reply payload.
      responses:
        "200":
          description: AI task validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/import:
    post:
      tags: [Commands]
      summary: Preview or import a single-task AI reply
      operationId: importAiAgentTask
      parameters:
        - name: dryRun
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Single-task AI reply JSON object, either as the raw reply
                payload, a `payload`/`data` wrapper, or a Granoflow AI reply
                envelope. `data.review_card_drafts[]` must always keep complete
                fallback content in `front` and `back`. When
                `/v1/ai-agent/tools` advertises
                `review_card_draft_note_fields_v1`, card drafts may also carry
                `note_fields[]` entries with `key`, `label`, `type`, `value`,
                and optional `tts_language_code` for `text_to_speech`, plus
                `front_layout` and `back_layout`.
              properties:
                toolId:
                  type: string
                  description: Optional tool id. Defaults to `single_task_ai`.
                payload:
                  type: object
                  description: >
                    Single-task AI reply payload. Enhanced review-card fields
                    require `review_card_draft_note_fields_v1`; otherwise
                    callers should keep pronunciation, phonetic, and
                    translation hints directly in `front` and `back`.
                data:
                  type: object
                  description: Alternate wrapper for the single-task AI reply payload.
                dryRunId:
                  type: string
                  description: Optional client dry-run correlation id.
      responses:
        "200":
          description: AI task import or preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/historical-mutations:
    post:
      tags: [Commands]
      summary: Preview or apply controlled historical task mutations
      description: >
        AI-agent endpoint for personal historical fact correction. This is the
        only Local HTTP API task endpoint that accepts physical historical task
        fields such as `createdAt`, `updatedAt`, `startedAt`, and `endedAt`.
        Ordinary `/v1/tasks` CRUD must not silently accept those fields.
      operationId: mutateHistoricalTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoricalTaskMutationRequest"
      responses:
        "200":
          description: Historical task mutation preview or apply result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoricalTaskMutationResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/gfmcp/prepare:
    post:
      tags: [Commands]
      summary: Ensure the GFMCP automation tag and localized task template
      operationId: prepareGfmcpAutomation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: GFMCP tag and template readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/context-pack:
    post:
      tags: [Commands]
      summary: Build a structured AI-agent work-memory context pack
      description: >
        Returns scoped projects, milestones, tasks, task reviews, and reusable
        work-memory context as structured facts. Project and milestone entries
        may include their description fields so agents can read the current
        living context. This endpoint does not expose embedding scores, planning
        hints, risk scores, or agent recommendations.
      operationId: buildAiAgentContextPack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  enum: [task, project, repo]
                repo:
                  type: string
                taskId:
                  type: string
                projectId:
                  type: string
                query:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 25
                client:
                  type: string
      responses:
        "200":
          description: Structured work-memory context pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/memory-batches/preview:
    post:
      tags: [Commands]
      summary: Preview an AI-agent memory batch before any write
      description: >
        Preview-only endpoint for agent-submitted task completions, task
        reviews, and review-card candidates. The App owns project/milestone
        matching and duplicate signals; this endpoint never writes data.
      operationId: previewAiAgentMemoryBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                source:
                  type: object
                target:
                  type: object
                  properties:
                    projectId:
                      type: string
                    milestoneId:
                      type: string
                items:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required: [title]
                    properties:
                      clientItemId:
                        type: string
                      kind:
                        type: string
                        enum: [task_completion, task_review, review_card_candidate]
                      title:
                        type: string
                      summary:
                        type: string
                      completedAt:
                        type: string
                        format: date-time
                      reviewCardCandidates:
                        type: array
                        items:
                          type: object
                dryRun:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Server-side preview result; writesPerformed is always false.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/project-context-attachments/ensure:
    post:
      tags: [Commands]
      summary: Ensure canonical project context YAML attachments exist
      description: >
        Ensures `project_snapshot.yaml` and `project_rules.yaml` exist as
        project document attachments. This endpoint creates templates only when
        `dryRun` is false.
      operationId: ensureAiAgentProjectContextAttachments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: string
                dryRun:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Canonical attachment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/project-context-attachments/read:
    post:
      tags: [Commands]
      summary: Read a bounded project context YAML section
      description: >
        Reads only the header, summary, and smallest matching section by
        default. Full reads require explicit full audit/export/migration/rewrite
        intent.
      operationId: readAiAgentProjectContextAttachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: string
                attachment:
                  type: string
                  enum: [snapshot, rules, project_snapshot.yaml, project_rules.yaml]
                section:
                  type: string
                query:
                  type: string
                intent:
                  type: string
                allowFullRead:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Bounded attachment content or stale/conflict status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/project-context-attachments/reconcile:
    post:
      tags: [Commands]
      summary: Check or reconcile project context YAML freshness
      description: >
        Reconciles low-risk factual snapshot deltas. Rules, wording,
        positioning, and long-lived decision conflicts return a proposal or
        conflict report instead of being silently overwritten.
      operationId: reconcileAiAgentProjectContextAttachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: string
                attachment:
                  type: string
                  enum: [snapshot, rules, project_snapshot.yaml, project_rules.yaml]
                dryRun:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Freshness or reconcile result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/project-context-attachments/write:
    post:
      tags: [Commands]
      summary: Write a project context YAML attachment with safety gates
      description: >
        Writes snapshot content directly when safe. Writes to `project_rules.yaml`
        require confirmation unless the caller is only requesting a proposal.
        Secret or privacy risks fail closed.
      operationId: writeAiAgentProjectContextAttachment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, content]
              properties:
                projectId:
                  type: string
                attachment:
                  type: string
                  enum: [snapshot, rules, project_snapshot.yaml, project_rules.yaml]
                section:
                  type: string
                content:
                  type: string
                confirmed:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Write result, proposal, or fail-closed error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/task-completions:
    post:
      tags: [Commands]
      summary: Record an engineering task completion through controlled paths
      description: >
        V1 capability endpoint for task-completion records. The App must
        delegate to existing task write/complete paths or fail closed; this
        endpoint must not introduce a second task-completion business rule.
      operationId: recordAiAgentTaskCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, summary, outcome]
              properties:
                repo:
                  type: string
                title:
                  type: string
                summary:
                  type: string
                decisions:
                  type: array
                  items:
                    type: string
                outcome:
                  type: string
                  enum: [success, failed]
                tags:
                  type: array
                  items:
                    type: string
                client:
                  type: string
                source:
                  type: object
      responses:
        "200":
          description: Task completion record result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/review-cards:
    post:
      tags: [Commands]
      summary: Record a reusable review card through controlled paths
      description: >
        V1 capability endpoint for reusable lessons. The App must delegate to
        existing controlled review-card import/create and duplicate-protection
        paths or fail closed; this endpoint must not directly insert cards.
      operationId: recordAiAgentReviewCard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, problem, solution]
              properties:
                title:
                  type: string
                problem:
                  type: string
                solution:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                client:
                  type: string
                source:
                  type: object
      responses:
        "200":
          description: Review card record result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/review-cards/similar:
    post:
      tags: [Commands]
      summary: Search similar review cards for an AI agent
      description: >
        App-owned similarity endpoint for AI agents. Granoflow prefers local
        vector search, then uses caller-supplied keywords when vectors are
        disabled, unavailable, or return no usable candidates. The response
        identifies `searchMode` as `vector` or `keyword_fallback` and returns
        compact review-card matches only. Results do not include project,
        milestone, task, attachment body, raw local path, or binary content.
      operationId: searchAiAgentSimilarReviewCards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary]
              properties:
                summary:
                  type: string
                  minLength: 1
                  maxLength: 500
                errorText:
                  type: string
                  maxLength: 1000
                repo:
                  type: string
                module:
                  type: string
                paths:
                  type: array
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 240
                keywords:
                  type: array
                  maxItems: 12
                  items:
                    type: string
                    minLength: 1
                limit:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 8
                client:
                  type: string
      responses:
        "200":
          description: Similar review cards with vector or keyword-fallback mode metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/review-cards/authoring/preview:
    post:
      tags: [Commands]
      summary: Preview controlled review-card authoring operations
      description: >
        Validates the project task, loads current card and shared-note state,
        returns field diffs and affected cards/tasks, and issues an expiring
        preview token/hash. This endpoint performs no writes.
      operationId: previewAiAgentReviewCardAuthoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId, operations]
              properties:
                taskId:
                  type: string
                operations:
                  type: array
                  minItems: 1
                  items:
                    type: object
      responses:
        "200":
          description: Zero-write authoring preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/review-cards/authoring/apply:
    post:
      tags: [Commands]
      summary: Apply approved review-card authoring operations
      description: >
        Applies only approved operation IDs from an unchanged, unexpired
        preview. Supports existing-card linking, field-level card/note updates,
        and one-note-to-many-card creation, then returns App-owned readback.
      operationId: applyAiAgentReviewCardAuthoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [previewToken, previewHash, approvedOperationIds]
              properties:
                previewToken:
                  type: string
                previewHash:
                  type: string
                approvedOperationIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        "200":
          description: Controlled authoring apply result and readback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/sync/status:
    get:
      tags: [Sync]
      summary: Read cloud sync status through the app service layer
      operationId: getSyncStatus
      responses:
        "200":
          description: Sync status result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/sync/pull:
    post:
      tags: [Sync]
      summary: Pull cloud data into the local app through the app service layer
      operationId: postSyncPull
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Sync pull result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
