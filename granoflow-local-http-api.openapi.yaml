  /v1/reviews/days/{date}:
    parameters:
      - name: date
        in: path
        required: true
        description: Local review date in YYYY-MM-DD format.
        schema:
          type: string
          format: date
    get:
      tags: [Reviews]
      summary: Get daily review reflection
      description: |
        Reads the daily review for a local date, including focus/task aggregates and editable
        reflection fields. Review means reflection / retrospective record.
      operationId: getDailyReview
      responses:
        "200":
          description: Daily review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReviewResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Reviews]
      summary: Update daily review reflection
      description: |
        Updates editable daily reflection fields. Arbitrary gapAnswers maps are not accepted;
        use the documented reflectionAnswers keys only.
      operationId: updateDailyReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyReviewPatchRequest"
      responses:
        "200":
          description: Updated daily review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReviewResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/reviews/weeks/{weekStart}:
    parameters:
      - name: weekStart
        in: path
        required: true
        description: Local week start date in YYYY-MM-DD format.
        schema:
          type: string
          format: date
    get:
      tags: [Reviews]
      summary: Get weekly review reflection
      description: Reads the weekly summary and weekly value review entries for a local week.
      operationId: getWeeklyReview
      responses:
        "200":
          description: Weekly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReviewResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Reviews]
      summary: Update weekly review summary
      description: Updates the weekly summary content. Weekly value scores use the value endpoint.
      operationId: updateWeeklyReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyReviewPatchRequest"
      responses:
        "200":
          description: Updated weekly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReviewResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/reviews/weeks/{weekStart}/values/{valueId}:
    parameters:
      - name: weekStart
        in: path
        required: true
        description: Local week start date in YYYY-MM-DD format.
        schema:
          type: string
          format: date
      - name: valueId
        in: path
        required: true
        description: Value id returned by the domain-values API.
        schema:
          type: string
    put:
      tags: [Reviews]
      summary: Set weekly value review
      description: |
        Creates or updates a weekly score and note for one value. Obtain valueId from the
        domain-values API before calling this endpoint.
      operationId: setWeeklyValueReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyValueReviewPatchRequest"
      responses:
        "200":
          description: Updated weekly value review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyValueReviewResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Reviews]
      summary: Update weekly value review
      description: |
        Updates a weekly score and/or note for one value. Obtain valueId from the domain-values
        API before calling this endpoint.
      operationId: updateWeeklyValueReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyValueReviewPatchRequest"
      responses:
        "200":
          description: Updated weekly value review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyValueReviewResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/reviews/months/{month}:
    parameters:
      - name: month
        in: path
        required: true
        description: Local review month in YYYY-MM format.
        schema:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
    get:
      tags: [Reviews]
      summary: Get monthly review aggregate
      description: Reads the monthly aggregate review and editable monthly review content.
      operationId: getMonthlyReview
      responses:
        "200":
          description: Monthly review aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReviewResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Reviews]
      summary: Update monthly review content
      description: Updates the monthly review content. Monthly aggregate metrics remain read-only.
      operationId: updateMonthlyReview
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonthlyReviewPatchRequest"
      responses:
        "200":
          description: Updated monthly review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReviewResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      required: [status, apiEnabled, running, version, serverTime]
      properties:
        status:
          type: string
          enum: [ok]
        apiEnabled:
          type: boolean
        running:
          type: boolean
        version:
          type: string
        releaseDate:
          type: [string, "null"]
        serverTime:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [version, buildNumber, channel, gitCommit]
      properties:
        version:
          type: string
        buildNumber:
          type: string
        releaseDate:
          type: [string, "null"]
        channel:
          type: string
        gitCommit:
          type: string
    CapabilitiesResponse:
      type: object
      additionalProperties: true
      required: [apiVersion, resources, dryRun, aiAgent, auth]
      properties:
        apiVersion:
          type: string
        appVersion:
          type: string
        resources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        dryRun:
          type: object
          additionalProperties: true
        aiAgent:
          type: object
          additionalProperties: true
        auth:
          type: object
          additionalProperties: true
    CommandEnvelope:
      type: object
      additionalProperties: true
      description: |
        Forwarded to the App command handler as-is.
    CommandResult:
      type: object
      additionalProperties: true
      description: |
        App command result envelope.
    HistoricalTaskMutationRequest:
      type: object
      additionalProperties: false
      required: [dryRun, source, mutations]
      properties:
        dryRun:
          type: boolean
        source:
          $ref: "#/components/schemas/HistoricalTaskMutationSource"
        mutations:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/HistoricalTaskMutation"
    HistoricalTaskMutationSource:
      type: object
      additionalProperties: true
      properties:
        kind:
          type: string
        threadId:
          type: string
        summary:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
    HistoricalTaskMutation:
      type: object
      additionalProperties: false
      required: [clientMutationId, op]
      properties:
        clientMutationId:
          type: string
        op:
          type: string
          enum: [create, update, softDelete]
        taskId:
          type: string
        fields:
          $ref: "#/components/schemas/HistoricalTaskMutationFields"
        reason:
          type: string
    HistoricalTaskMutationFields:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        status:
          type: string
          enum: [pending, doing, done, archived, trashed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        dueAt:
          type: string
          format: date-time
        remindAt:
          type: string
          format: date-time
        description:
          type: string
        taskReview:
          type: string
        projectId:
          type: [string, "null"]
        milestoneId:
          type: [string, "null"]
        tags:
          type: array
          items:
            type: string
    HistoricalTaskMutationResponse:
      type: object
      additionalProperties: false
      required: [ok, data]
      properties:
        ok:
          type: boolean
        data:
          type: object
          additionalProperties: false
          required: [dryRun, acceptedCount, rejectedCount, results]
          properties:
            dryRun:
              type: boolean
            acceptedCount:
              type: integer
            rejectedCount:
              type: integer
            results:
              type: array
              items:
                $ref: "#/components/schemas/HistoricalTaskMutationResult"
    HistoricalTaskMutationResult:
      type: object
      additionalProperties: false
      required: [clientMutationId, op, status, warnings, errors]
      properties:
        clientMutationId:
          type: string
        op:
          type: string
          enum: [create, update, softDelete]
        status:
          type: string
          enum: [accepted, rejected, applied]
        taskId:
          type: string
        readback:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalTaskMutationWarning"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalTaskMutationError"
    HistoricalTaskMutationWarning:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    HistoricalTaskMutationError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invalid_payload
            - unsupported_capability
            - batch_limit_exceeded
            - task_not_found
            - project_not_found
            - milestone_not_found
            - project_milestone_mismatch
            - title_required
            - invalid_time_range
            - completed_ended_at_required
            - doing_started_at_required
            - historical_fields_not_supported
        message:
          type: string
    FilePathRequest:
      type: object
      additionalProperties: false
      required: [file]
      properties:
        file:
          type: string
        path:
          type: string
        inputPath:
          type: string
    TaskCompleteRequest:
      type: object
      additionalProperties: false
      properties:
        startedAt:
          type: string
          format: date-time
          description: Optional start timestamp to apply before completing the task.
        endedAt:
          type: string
          format: date-time
          description: Optional completion timestamp to apply before completing the task.
    DailyReviewResult:
      type: object
      required: [entity_type, entity]
      properties:
        entity_type:
          type: string
          enum: [review.day]
        updated:
          type: boolean
        entity:
          $ref: "#/components/schemas/DailyReview"
    DailyReview:
      type: object
      required: [date, focusMinutes, completedTasks, sessionCount, totalInvestedMinutes, reflection]
      properties:
        date:
          type: string
          format: date
        focusMinutes:
          type: integer
        completedTasks:
          type: array
          items:
            type: object
            additionalProperties: true
        sessionCount:
          type: integer
        totalInvestedMinutes:
          type: integer
        reflection:
          $ref: "#/components/schemas/DailyReviewReflection"
    DailyReviewReflection:
      type: object
      required: [reflectionAnswers]
      properties:
        longNote:
          type: [string, "null"]
        moodScore:
          type: [integer, "null"]
        moodNote:
          type: [string, "null"]
        efficiencyScore:
          type: [integer, "null"]
        efficiencyNote:
          type: [string, "null"]
        reflectionAnswers:
          $ref: "#/components/schemas/DailyReflectionAnswers"
    DailyReflectionAnswers:
      type: object
      additionalProperties: false
      properties:
        real_focus_time:
          type: [string, "null"]
        interruption_count:
          type: [string, "null"]
        energy_state:
          type: [string, "null"]
        work_learning_report:
          type: [string, "null"]
    DailyReviewPatchRequest:
      type: object
      additionalProperties: false
      properties:
        longNote:
          type: [string, "null"]
        moodScore:
          type: integer
        moodNote:
          type: [string, "null"]
        efficiencyScore:
          type: integer
        efficiencyNote:
          type: [string, "null"]
        reflectionAnswers:
          $ref: "#/components/schemas/DailyReflectionAnswers"
    WeeklyReviewResult:
      type: object
      required: [entity_type, entity]
      properties:
        entity_type:
          type: string
          enum: [review.week]
        updated:
          type: boolean
