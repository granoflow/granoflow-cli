      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
    post:
      tags: [Resources]
      summary: Atomically create an idempotent ordered task node batch
      operationId: batchCreateTaskNodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotencyKey, expectedTaskUpdatedAt, nodes]
              properties:
                idempotencyKey:
                  type: string
                expectedTaskUpdatedAt:
                  type: string
                  format: date-time
                nodes:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    required: [title]
                    properties:
                      title:
                        type: string
                      parentId:
                        type: string
                        nullable: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
