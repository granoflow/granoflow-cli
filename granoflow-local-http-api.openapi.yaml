openapi: 3.1.0
info:
  title: Granoflow Local HTTP API
  version: 0.2.0
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "56789"
security:
  - bearerAuth: []
tags:
  - name: Meta
  - name: Commands
  - name: Resources
  - name: Reviews
paths:
  /:
    get:
      tags: [Meta]
      summary: Human-readable welcome page
      description: Public browser-friendly landing response with version and API documentation URL.
      operationId: getWelcome
      security: []
      responses:
        "200":
          description: Welcome text
          content:
            text/plain:
              schema:
                type: string
  /v1/health:
    get:
      tags: [Meta]
      summary: Health check
      description: Public health probe. No bearer token required.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Server reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/version:
    get:
      tags: [Meta]
      summary: Version metadata
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/capabilities:
    get:
      tags: [Meta]
      summary: Machine-readable Local HTTP API capabilities
      description: Public capability discovery for CLI, scripts, and AI automation.
      operationId: getCapabilities
      security: []
      responses:
        "200":
          description: Capability payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
  /v1/commands:
    post:
      tags: [Commands]
      summary: Execute command envelope
      operationId: postCommands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandEnvelope"
      responses:
        "200":
          description: Command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/sync/status:
    get:
      tags: [Commands]
      summary: Read App sync status through the shared SyncService
      operationId: getSyncStatus
      responses:
        "200":
          description: Sync status command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/sync/push:
    post:
      tags: [Commands]
      summary: Push local pending records through the shared SyncService
      operationId: postSyncPush
      responses:
        "200":
          description: Sync push command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/sync/pull:
    post:
      tags: [Commands]
      summary: Pull remote records through the shared SyncService
      operationId: postSyncPull
      responses:
        "200":
          description: Sync pull command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/backup/exports:
    post:
      tags: [Commands]
      summary: Export an App backup through the shared LocalBackupController
      operationId: postBackupExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outputPath]
              properties:
                outputPath:
                  type: string
      responses:
        "200":
          description: Backup export command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/backup/imports/preview:
    post:
      tags: [Commands]
      summary: Preview an App backup package
      operationId: postBackupImportPreview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputPath]
              properties:
                inputPath:
                  type: string
      responses:
        "200":
          description: Backup preview command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/backup/imports:
    post:
      tags: [Commands]
      summary: Restore an App backup through the shared LocalBackupController
      operationId: postBackupImportRestore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inputPath, confirm]
              properties:
                inputPath:
                  type: string
                secretFile:
                  type: [string, "null"]
                confirm:
                  type: boolean
                allowMissingAttachments:
                  type: boolean
                allowLargeAttachmentConversion:
                  type: boolean
      responses:
        "200":
          description: Backup restore command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/ai-agent/tools:
    get:
      tags: [Commands]
      summary: List AI agent tools exposed by the App service layer
      operationId: listAiAgentTools
      responses:
        "200":
          description: AI agent tool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/{id}/export:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Commands]
      summary: Export a single-task AI request package
      operationId: exportAiAgentTask
      responses:
        "200":
          description: AI task request package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/validate:
    post:
      tags: [Commands]
      summary: Validate a single-task AI reply
      operationId: validateAiAgentTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute local APKG file path.
      responses:
        "200":
          description: AI task validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/ai-agent/tasks/import:
    post:
      tags: [Commands]
      summary: Preview or import a single-task AI reply
      operationId: importAiAgentTask
      parameters:
        - name: dryRun
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute local APKG file path.
                dryRunId:
                  type: string
                  description: Optional client dry-run correlation id.
                skipCardsWithMissingMedia:
                  type: boolean
                  default: false
                  description: Confirm the existing missing-media choice.
                stripRemoteMedia:
                  type: boolean
                  default: false
                  description: Remove remote media tokens before importing.
      responses:
        "200":
          description: AI task import or preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/tasks:
    get:
      tags: [Resources]
      summary: List tasks
      operationId: listTasks
