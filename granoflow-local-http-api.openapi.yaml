                  type: string
                confirmed:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Write result, proposal, or fail-closed error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      required: [status, apiEnabled, running, version, serverTime]
      properties:
        status:
          type: string
          enum: [ok]
        apiEnabled:
          type: boolean
        running:
          type: boolean
        version:
          type: string
        releaseDate:
          type: [string, "null"]
        serverTime:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [version, buildNumber, channel, gitCommit]
      properties:
        version:
          type: string
        buildNumber:
          type: string
        releaseDate:
          type: [string, "null"]
        channel:
          type: string
        gitCommit:
          type: string
    CapabilitiesResponse:
      type: object
      additionalProperties: true
      required: [apiVersion, resources, dryRun, aiAgent, auth]
      properties:
        apiVersion:
          type: string
        appVersion:
          type: string
        resources:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        dryRun:
          type: object
          additionalProperties: true
        aiAgent:
          type: object
          additionalProperties: true
        auth:
          type: object
          additionalProperties: true
    CommandEnvelope:
      type: object
      additionalProperties: true
      description: |
        Forwarded to the App command handler as-is.
    CommandResult:
      type: object
      additionalProperties: true
      description: |
        App command result envelope.
    TaskCompleteRequest:
      type: object
      additionalProperties: false
      properties:
        startedAt:
          type: string
          format: date-time
          description: Optional start timestamp to apply before completing the task.
        endedAt:
          type: string
          format: date-time
          description: Optional completion timestamp to apply before completing the task.
    DailyReviewResult:
      type: object
      required: [entity_type, entity]
      properties:
        entity_type:
          type: string
          enum: [review.day]
        updated:
          type: boolean
        entity:
          $ref: "#/components/schemas/DailyReview"
    DailyReview:
      type: object
      required: [date, focusMinutes, completedTasks, sessionCount, totalInvestedMinutes, reflection]
      properties:
        date:
          type: string
          format: date
        focusMinutes:
          type: integer
        completedTasks:
          type: array
          items:
            type: object
            additionalProperties: true
        sessionCount:
          type: integer
        totalInvestedMinutes:
          type: integer
        reflection:
          $ref: "#/components/schemas/DailyReviewReflection"
    DailyReviewReflection:
      type: object
      required: [reflectionAnswers]
      properties:
        longNote:
          type: [string, "null"]
        moodScore:
          type: [integer, "null"]
        moodNote:
          type: [string, "null"]
        efficiencyScore:
          type: [integer, "null"]
        efficiencyNote:
          type: [string, "null"]
        reflectionAnswers:
          $ref: "#/components/schemas/DailyReflectionAnswers"
    DailyReflectionAnswers:
      type: object
      additionalProperties: false
      properties:
        real_focus_time:
          type: [string, "null"]
        interruption_count:
          type: [string, "null"]
        energy_state:
          type: [string, "null"]
        work_learning_report:
          type: [string, "null"]
    DailyReviewPatchRequest:
      type: object
      additionalProperties: false
      properties:
        longNote:
          type: [string, "null"]
        moodScore:
          type: integer
        moodNote:
          type: [string, "null"]
        efficiencyScore:
          type: integer
        efficiencyNote:
          type: [string, "null"]
        reflectionAnswers:
          $ref: "#/components/schemas/DailyReflectionAnswers"
    WeeklyReviewResult:
      type: object
      required: [entity_type, entity]
      properties:
        entity_type:
          type: string
          enum: [review.week]
        updated:
          type: boolean
        entity:
          $ref: "#/components/schemas/WeeklyReview"
    WeeklyReview:
      type: object
      required:
        [weekStart, weekEnd, totalFocusMinutes, completedTaskCount, averageDailyMinutes, sessionCount, totalInvestedMinutes, values]
      properties:
        weekStart:
          type: string
          format: date
        weekEnd:
          type: string
          format: date
        totalFocusMinutes:
          type: integer
        completedTaskCount:
          type: integer
        averageDailyMinutes:
          type: integer
        sessionCount:
          type: integer
        totalInvestedMinutes:
          type: integer
        content:
          type: [string, "null"]
        values:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyValueReview"
    WeeklyReviewPatchRequest:
      type: object
      additionalProperties: false
      properties:
        content:
          type: string
    WeeklyValueReviewResult:
      type: object
      required: [entity_type, entity]
      properties:
        entity_type:
          type: string
          enum: [review.week.value]
        updated:
          type: boolean
        entity:
          $ref: "#/components/schemas/WeeklyValueReview"
    WeeklyValueReview:
      type: object
      required: [id, weekStart, domainSlug, valueId, valueTitle]
      properties:
        id:
          type: string
        weekStart:
          type: string
          format: date
        domainSlug:
          type: string
        valueId:
          type: string
        score:
          type: [integer, "null"]
        note:
          type: [string, "null"]
        valueTitle:
          type: string
        valueDescription:
          type: [string, "null"]
    WeeklyValueReviewPatchRequest:
